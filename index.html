<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Product preview card component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,WONK@9..144,700,0..1&family=Montserrat:wght@100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main>
    <!-- Item Card -->
    <div class="card">
      <!-- Item Picture -->
      <picture class="item-image">
        <source srcset="./images/image-product-desktop.jpg" media="(min-width: 37.5rem)">
        <img src="./images/image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum" loading="eager"
          decoding="sync">
      </picture>
      <!-- Item details -->
      <div class="card-details">
        <p class="item-category">Perfume</p>

        <h1 class="item-title">Gabrielle Essence Eau De Parfum</h1>

        <p class="item-desc">
          A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.
        </p>

        <p class="item-price"><span>$149.99</span><span>$169.99</span></p>

        <!-- Button -->
        <button>
          <img src="./images/icon-cart.svg">
          Add to Cart
        </button>
      </div>
    </div>
  </main>
</body>

</html>
